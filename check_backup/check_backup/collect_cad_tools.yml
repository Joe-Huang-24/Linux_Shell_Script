- name: Combine all host logs
  hosts: sr665-1
  tasks:
          - name: Concatenate logs
            shell: |
                    cat /mis_daily_check/py/py_log/*.log | grep -v '===' | sort > /mis_daily_check/py/py_log/tmp_test.log && \
                    mv /mis_daily_check/py/py_log/tmp_test.log /mis_daily_check/py/py_log/test.log
