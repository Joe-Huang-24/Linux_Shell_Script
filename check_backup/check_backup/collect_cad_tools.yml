---
- name: test
  hosts: centos74, centos79
  gather_facts: yes

  tasks:
          - name: Ensure target log directory exists
            file:
                    path: /mis_daily_check/py/py_log/
                    state: directory
                    mode: '0750'

          - name: test-1
            shell: |
                   echo "=== {{ inventory_hostname }} @ $(date '+%Y-%m-%d %H:%M:%S') ===" > /mis_daily_check/py/py_log/{{ ansible_hostname }}.log
                   {{ python_bin | default('python') }} /mis_daily_check/py/list_user_process/core/test1.py >> /mis_daily_check/py/py_log/{{ ansible_hostname }}.log

          - name: Fetch per-host log to control node
            fetch:
                    src: /mis_daily_check/py/py_log/{{ ansible_hostname }}.log
                    dest: /mis_daily_check/py/py_log/
                    flat: yes

